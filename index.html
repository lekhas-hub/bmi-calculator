<!DOCTYPE html>
<html>
<head>
    <title>BMI Calculator</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f4f8;
            text-align: center;
        }

        .container {
            background: white;
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
        }

        #result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BMI Calculator</h1>

        <input type="number" id="weight" placeholder="Enter weight in kg">
        <input type="number" id="height" placeholder="Enter height in meters">

        <button onclick="calculateBMI()">Calculate</button>

        <div id="result"></div>
    </div>

    <script>
        function calculateBMI() {
            let weight = document.getElementById("weight").value;
            let height = document.getElementById("height").value;

            if (weight === "" || height === "") {
                alert("Please fill all fields");
                return;
            }

            let bmi = weight / (height * height);
            bmi = bmi.toFixed(2);

            let category = "";

            if (bmi < 18.5) {
                category = "Underweight";
            } else if (bmi < 25) {
                category = "Normal";
            } else if (bmi < 30) {
                category = "Overweight";
            } else {
                category = "Obese";
            }

            document.getElementById("result").innerText =
                "Your BMI is " + bmi + " (" + category + ")";
        }
    </script>

</body>
</html>
